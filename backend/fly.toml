# fly.toml — PrintScout backend
# `app` is set automatically on `fly launch`.

primary_region = "fra"   # Frankfurt — close to typical Neon EU region.

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "alembic upgrade head"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  # Public-facing base URL — set to https://<app>.fly.dev after first deploy
  # (or override here once the app name is known).

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"   # 256mb is too tight for trimesh + numpy.
