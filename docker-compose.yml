services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: printscout
      POSTGRES_PASSWORD: printscout
      POSTGRES_DB: printscout
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printscout"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
